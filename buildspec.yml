version: 0.3

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 148908330752.dkr.ecr.eu-north-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - docker build -t task-api .
      - docker tag task-api:latest 148908330752.dkr.ecr.eu-north-1.amazonaws.com/task-api:latest

  post_build:
    commands:
      - echo Pushing image.n Now reading from latest spec from git..
      - docker push 148908330752.dkr.ecr.eu-north-1.amazonaws.com/task-api:latest
      - echo Deploying to ECS...
      - aws ecs update-service \
          --cluster task-cluster \
          --service task-api-service-86o20j15 \
          --force-new-deployment